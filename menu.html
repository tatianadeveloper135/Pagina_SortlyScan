<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reciclaje - Inicio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background-color: #2E7D32; /* Verde oscuro */
      overflow: hidden;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .navbar .logo {
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-decoration: none;
      padding: 14px 0;
    }

    .navbar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    .navbar ul li {
      padding: 14px 20px;
    }

    .navbar ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .navbar ul li a:hover {
      background-color: #1B5E20; 
      border-radius: 4px;
      padding: 6px 10px;
    }

    @media (max-width: 768px) {
      .navbar ul {
        flex-direction: column;
        background-color: #2E7D32;
        width: 100%;
        display: none;
      }

      .navbar ul.show {
        display: flex;
      }

      .menu-toggle {
        display: block;
        cursor: pointer;
        font-size: 26px;
        color: white;
      }
    }

    .menu-toggle {
      display: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="logo">SortlyScan</a>
    <span class="menu-toggle" onclick="toggleMenu()">☰</span>
    <ul id="nav-links">
      <li><a href="../Login%202/index.html">Inicio</a></li>
      <li><a href="../Login%202/sobre-nosotros.html">Sobre Nosotros</a></li>
      <li><a href="../Login%202/como-reciclar.html">¿Cómo Reciclar?</a></li>
      <li><a href="../Login%202/puntos-recoleccion.html">Puntos de Recolección</a></li>
      <li><a href="../Login%202/contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <script>
    function toggleMenu() {
      const navLinks = document.getElementById('nav-links');
      navLinks.classList.toggle('show');
    }
  </script>

</body>
</html>
